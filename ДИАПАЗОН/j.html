<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J-антенна — ДИАПАЗОН</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="page-header">
            <a href="calculators.html" class="btn-back">← Назад</a>
            <a href="index.html" class="btn-back">Главная</a>
            <span class="logo-small">ДИАПАЗОН</span>
        </div>
        <div class="card">
            <h2>J-антенна</h2>
            <div class="sub">вертикальная антенна с согласующим шлейфом (J-образная)</div>

            <!-- Три поля ввода -->
            <label>Частота (МГц)</label>
            <input type="number" id="jFreq" value="145" step="0.1">

            <label>Волновое сопротивление кабеля (Ом)</label>
            <input type="number" id="jCableZ" value="50" step="1">

            <label>Диаметр проводника (мм) — для учёта укорочения</label>
            <input type="number" id="jWireDiam" value="2" step="0.1">

            <div class="btn-row">
                <button class="btn" onclick="calcJ()">Рассчитать</button>
            </div>

            <div class="result" id="jResult">Результат появится здесь</div>
        </div>
        <footer>
            ДИАПАЗОН
            <br>© 2026
        </footer>
    </div>
