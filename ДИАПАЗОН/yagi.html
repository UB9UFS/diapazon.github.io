<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Яги — ДИАПАЗОН</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">

        <div class="page-header">
            <a href="calculators.html" class="btn-back">← Назад</a>
            <a href="index.html" class="btn-back">Главная</a>
            <span class="logo-small">ДИАПАЗОН</span>
        </div>

        <div class="card">
            <h2>Яги (Yagi)</h2>
            <div class="sub">директорная антенна с расширенными настройками</div>

            <label>Частота (МГц)</label>
            <input type="number" id="yagiFreq" value="144" step="0.1">

            <label>Число элементов (включая рефлектор и вибратор)</label>
            <input type="number" id="yagiElements" value="5" step="1" min="3">

            <label>Диаметр элемента d (мм)</label>
            <input type="number" id="yagiDiam" value="6" step="0.1">

            <label>Диаметр траверсы (стрелы), мм</label>
            <input type="number" id="yagiBoom" value="20" step="0.1">

            <label>Тип вибратора</label>
            <select id="yagiVibType">
                <option value="direct">Прямой (штырь)</option>
                <option value="loop" selected>Петлевой (шлейф)</option>
            </select>

            <label>Приоритет настройки</label>
            <select id="yagiMode">
                <option value="gain">Максимальное усиление</option>
                <option value="fb">Максимальное F/B</option>
                <option value="wide">Широкополосный</option>
            </select>

            <div class="btn-row">
                <button class="btn" onclick="calcYagi()">Рассчитать</button>
            </div>

            <div class="result" id="yagiResult">Результат появится здесь</div>
        </div>

        <footer>
            ДИАПАЗОН
            <br>© 2026
        </footer>

    </div>

    <script src="js/script.js"></script>
</body>
</html>
